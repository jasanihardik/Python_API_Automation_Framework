[pytest]
minversion = 8.0
addopts = -ra --strict-markers --tb=short --html=reports/api_test_report.html --self-contained-html
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = tests
markers =
    api: API automation tests
    smoke: Critical smoke tests
    regression: Regression test coverage
    negative: Negative API validation tests
    contract: API schema and contract validation tests
    workflow: End-to-end API workflow tests
filterwarnings =
    ignore::DeprecationWarning
